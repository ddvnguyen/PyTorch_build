
<style>
*{box-sizing:border-box;margin:0;padding:0}
.root{padding:1rem 0;font-size:14px;color:var(--color-text-primary)}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

.selector-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
.chip{padding:6px 14px;border-radius:20px;border:0.5px solid var(--color-border-secondary);font-size:13px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all .15s}
.chip.active-cuda{background:#E6F1FB;border-color:#185FA5;color:#0C447C}
.chip.active-rocm{background:#FAECE7;border-color:#993C1D;color:#712B13}
.chip.active-cpu{background:#EAF3DE;border-color:#3B6D11;color:#27500A}

.os-row{display:flex;gap:8px;margin-bottom:1.5rem}
.os-btn{padding:5px 14px;border-radius:6px;border:0.5px solid var(--color-border-secondary);font-size:13px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all .15s}
.os-btn.active{background:var(--color-background-secondary);border-color:var(--color-border-primary);color:var(--color-text-primary);font-weight:500}

.phase{border:0.5px solid var(--color-border-tertiary);border-radius:12px;margin-bottom:10px;overflow:hidden}
.phase-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;background:var(--color-background-secondary);user-select:none}
.phase-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.phase-title{font-weight:500;font-size:14px;flex:1}
.phase-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.phase-arrow{font-size:11px;color:var(--color-text-tertiary);transition:transform .2s}
.phase.open .phase-arrow{transform:rotate(90deg)}
.phase-body{display:none;padding:12px 14px;border-top:0.5px solid var(--color-border-tertiary)}
.phase.open .phase-body{display:block}

.step-list{list-style:none}
.step-item{display:flex;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px;align-items:flex-start}
.step-item:last-child{border-bottom:none}
.step-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.step-info{flex:1}
.step-label{font-weight:500;color:var(--color-text-primary);margin-bottom:2px}
.step-cmd{font-family:var(--font-mono);font-size:11px;color:var(--color-text-secondary);background:var(--color-background-secondary);padding:3px 7px;border-radius:4px;display:inline-block;margin-top:3px;word-break:break-all}
.step-note{font-size:11px;color:var(--color-text-tertiary);margin-top:3px}
.step-tag{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:500;margin-left:6px;vertical-align:middle}

.tag-req{background:#FCEBEB;color:#A32D2D}
.tag-opt{background:#FAEEDA;color:#633806}
.tag-win{background:#E6F1FB;color:#0C447C}
.tag-lin{background:#EAF3DE;color:#27500A}
.tag-auto{background:#EEEDFE;color:#3C3489}

.env-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.env-table th{text-align:left;font-weight:500;font-size:11px;color:var(--color-text-secondary);padding:4px 6px;border-bottom:0.5px solid var(--color-border-tertiary)}
.env-table td{padding:5px 6px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:top}
.env-table tr:last-child td{border-bottom:none}
.env-val{font-family:var(--font-mono);font-size:11px;color:var(--color-text-primary)}
.env-desc{color:var(--color-text-secondary)}

.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1rem;font-size:12px;color:var(--color-text-secondary)}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:8px;height:8px;border-radius:50%}

.section-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 6px}
</style>

<div class="root">
<h2 class="sr-only">PyTorch build environment preparation plan — CUDA, ROCm, and CPU-only paths for Linux and Windows</h2>

<div style="margin-bottom:14px">
  <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px">Accelerator backend</div>
  <div class="selector-row" id="accel-row">
    <button class="chip active-cuda" onclick="setAccel('cuda',this)">NVIDIA CUDA</button>
    <button class="chip" onclick="setAccel('rocm',this)">AMD ROCm</button>
    <button class="chip" onclick="setAccel('cpu',this)">CPU-only</button>
  </div>
  <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px">Operating system</div>
  <div class="os-row">
    <button class="os-btn active" onclick="setOS('linux',this)">Linux</button>
    <button class="os-btn" onclick="setOS('windows',this)">Windows</button>

</div>

<div class="legend">

  <span class="legend-item"><span class="legend-dot" style="background:#7F77DD"></span>Auto-detected</span>
</div>

<div id="phases"></div>
</div>

function tagClass(req){return req==='req'?'tag-req':req==='opt'?'tag-opt':'tag-auto'}

function render(){
  var phases=data[accel][os];
  var html='';
  phases.forEach(function(p,i){
    var phaseId='phase-'+i;
    html+='<div class="phase" id="'+phaseId+'">';
    html+='<div class="phase-header" onclick="toggle(\''+phaseId+'\')">';
    html+='<div class="phase-num" style="background:'+p.color+'22;color:'+p.color+'">'+(i+1)+'</div>';
    html+='<span class="phase-title">'+p.title+'</span>';
    html+='<span class="phase-badge" style="background:'+p.color+'18;color:'+p.color+'">'+p.badge+'</span>';
    html+='<span class="phase-arrow">&#9654;</span></div>';
    html+='<div class="phase-body"><ul class="step-list">';
    p.steps.forEach(function(s){
      html+='<li class="step-item">';
      html+='<span class="step-dot" style="background:'+dotColor(s.req)+'"></span>';
      html+='<div class="step-info"><div class="step-label">'+s.label;
      html+='<span class="step-tag '+tagClass(s.req)+'">'+tagLabel(s.req)+'</span></div>';
      if(s.cmd) html+='<div><code class="step-cmd">'+s.cmd+'</code></div>';
      if(s.note) html+='<div class="step-note">'+s.note+'</div>';
      html+='</div></li>';
    });
    html+='</ul></div></div>';
  });
  document.getElementById('phases').innerHTML=html;
  document.getElementById('phase-0').classList.add('open');
}

function toggle(id){
  var el=document.getElementById(id);
  el.classList.toggle('open');
}

function setAccel(a,btn){
  accel=a;
  document.querySelectorAll('#accel-row .chip').forEach(function(b){
    b.className='chip';
  });
  btn.className='chip active-'+a;
  render();
}

function setOS(o,btn){
  os=o;
  document.querySelectorAll('.os-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  render();
}

render();
</script>
